info:
  name: get after update
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/document/get?oid={{documentOid}}"
  params:
    - name: oid
      value: "{{documentOid}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: bru.getVar("documentOid"));
    - type: tests
      code: |-
        test("Status is 200", () => {
            expect(res.getStatus()).to.equal(200);
        });

        test("Name is correct", () => {
            expect(res.getBody().name).to.equal(newName);
        });

        test("Description is correct", () => {
            expect(res.getBody().name).to.equal(newDescription);
        });
  assertions:
    - expression: name
      operator: eq
      value: Updated name
    - expression: newDescription
      operator: eq
      value: Updated description

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
