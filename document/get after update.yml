info:
  name: get after update
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/document/get?oid={{expectedDocumentId}}"
  params:
    - name: oid
      value: "{{expectedDocumentId}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: bru.getVar("expectedDocumentId");
    - type: tests
      code: |-
        test("Status is 200", () => {
            expect(res.getStatus()).to.equal(200);
        });

        test("Name is correct", () => {
            expect(res.getBody().name).to.equal(bru.getVar("newName"));
        });

        test("Description is correct", () => {
            expect(res.getBody().description).to.equal(bru.getVar("newDescription"));
        });
  assertions:
    - expression: res.body.name
      operator: eq
      value: "{{newName}}"
    - expression: res.body.description
      operator: eq
      value: "{{newDescription}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
