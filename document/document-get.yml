info:
  name: document/get
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/document/get?oid={{expectedDocumentId}}"
  params:
    - name: oid
      value: "{{expectedDocumentId}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status is 200", () => {
            expect(res.getStatus()).to.equal(200);
        });

        test("Name is correct", () => {
            expect(res.getBody().name).to.equal(bru.getVar("expectedDocumentName"));
        });
  assertions:
    - expression: res.body.name
      operator: eq
      value: "{{expectedDocumentName}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
