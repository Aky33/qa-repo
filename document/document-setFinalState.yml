info:
  name: document/setFinalState
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/document/setFinalState"
  body:
    type: json
    data: |-
      {
        "oid": "{{expectedDocumentId}}",
        "state": "closed"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.oid
      operator: eq
      value: "{{expectedDocumentId}}"
    - expression: res.body.state
      operator: eq
      value: '"closed"'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
