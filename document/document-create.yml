info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/document/create"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        // Build the body dynamically from variables
        req.setBody({
          data: {
            name: "Test_" + Date.now(),
            description: "temp",
            responsibleRoleId: "66b1e85944adaf9a1b854750",
            locationId: "6996fb4bf54227ea201552f2"
          },
          mode: "standard",
          force: false
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
