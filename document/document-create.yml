info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/document/create"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        // Build the body dynamically from variables
        req.setBody({
          data: {
            name: "Test_" + Date.now(),
            description: "temp",
            responsibleRoleId: bru.getEnvVar("locationID"),
            locationId: bru.getEnvVar("responsibleRoleID")
          },
          mode: "standard",
          force: false
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
