info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: '{{baseUrl}}/document/create'
  auth:
    type: bearer
    token: '{{token}}'

runtime:
  scripts:
    - type: before-request
      code: |-
        // Build the body dynamically from variables
        const expectedDocumentName = "Test_" + Date.now();
        bru.setEnvVar("expectedDocumentName", expectedDocumentName);
              
        req.setBody({
          data: {
            name: expectedDocumentName,
            description: "temp",
            responsibleRoleId: bru.getEnvVar("responsibleRoleID"),
            locationId: bru.getEnvVar("locationID")
          },
          mode: "standard",
          force: false
        });
  assertions:
    - expression: res.body.state
      operator: eq
      value: '"active"'
    - expression: res.body.description
      operator: eq
      value: '"temp"'
    - expression: res.body.loctaionId
      operator: eq
      value: '{{locationID}}'
    - expression: res.body.name
      operator: eq
      value: '{{expectedDocumentName}}'
    - expression: res.body.responsibleRoleId
      operator: eq
      value: '{{responsibleRoleID}}'
    - expression: awid
      operator: eq
      value: '{{awid}}'
    - type: after-response
      code: bru.setEnvVar("expectedDocumentId", res.body.oid);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
