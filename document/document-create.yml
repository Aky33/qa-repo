info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}"
  body:
    type: json
    data: |-
      {
        "data": {
          "name": "Test123",
          "description": "temp",
          "responsibleRoleId": "{{responsibleRoleID}}",
          "locationId": "{{locationID}}"
        },
        "mode": "standard",
        "force": false
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
