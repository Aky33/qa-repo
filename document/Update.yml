info:
  name: Update
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/document/update?name={{newDocumentName}}&&oid={{expectedDocumentId}}"
  params:
    - name: name
      value: "{{newDocumentName}}"
      type: query
    - name: oid
      value: "{{expectedDocumentId}}"
      type: query
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const newDocumentName = "Test_" + Date.now() + "_update";
        bru.setEnvVar("newDocumentName", newDocumentName);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.uuAppErrorMap
      operator: isDefined
    - expression: res.responseTime
      operator: lt
      value: "2000"
    - expression: res.body.name
      operator: eq
      value: "{{newDocumentName}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
